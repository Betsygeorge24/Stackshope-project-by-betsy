{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - StackShop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
</head>
<body class="font-sans min-h-screen bg-[#F0F0DB] text-[#30364F] flex flex-col justify-center items-center p-4">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border border-[#ACBAC4]/40">
        <h1 class="text-2xl font-bold mb-4">Forgot Password</h1>
        <p class="text-sm text-[#30364F]/80 mb-6">Enter your email address and we will send you a password reset link.</p>

        {% include "core_templates/messages.html" %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-bold mb-2" for="email">Email address</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-3 border border-[#ACBAC4]/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#30364F]" />
            </div>

            <button type="submit"
                class="w-full bg-[#30364F] text-[#F0F0DB] font-black uppercase tracking-widest py-3 rounded-xl hover:bg-[#30364F]/90 transition-all">Send Reset Link</button>
        </form>

        <p class="text-center text-sm text-[#30364F]/80 mt-4">
            Remember your password?
            <a href="{% url 'login' %}" class="font-bold text-[#30364F] hover:text-[#ACBAC4]">Sign in</a>
        </p>
    </div>
</body>
</html>
