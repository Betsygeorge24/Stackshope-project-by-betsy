{% load static %}
<!DOCTYPE html>
<html class="light scroll-smooth" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Seller Settings - StackShop</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "dark": "#30364F",
                        "muted": "#ACBAC4",
                        "accent": "#E1D9BC",
                        "light": "#F0F0DB",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>

<body class="bg-light text-dark font-display flex flex-col min-h-screen">
    {% include "seller_templates/seller_navbar.html" %}
    {% include "core_templates/messages.html" %}

    <main class="max-w-4xl mx-auto w-full px-4 mt-8 mb-20 flex-grow">
        <div class="bg-white rounded-2xl shadow-sm border border-muted/50 p-8">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-2xl font-bold">Seller Settings</h1>
                <a href="{% url 'seller-profile' %}" class="text-sm font-medium text-muted hover:text-dark">Back to Store Profile</a>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div class="bg-gray-50 border border-muted/40 p-6 rounded-xl">
                    <h2 class="text-lg font-bold mb-4">Change Password</h2>
                    <div class="grid gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-2">Current Password</label>
                            <input type="password" name="current_password" required
                                class="w-full px-4 py-3 border border-muted/40 rounded-lg focus:outline-none focus:border-dark focus:ring-1 focus:ring-dark" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2">New Password</label>
                            <input type="password" name="new_password" required
                                class="w-full px-4 py-3 border border-muted/40 rounded-lg focus:outline-none focus:border-dark focus:ring-1 focus:ring-dark" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2">Confirm New Password</label>
                            <input type="password" name="confirm_password" required
                                class="w-full px-4 py-3 border border-muted/40 rounded-lg focus:outline-none focus:border-dark focus:ring-1 focus:ring-dark" />
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="submit" class="bg-dark text-light px-5 py-2.5 rounded-lg font-bold hover:bg-accent hover:text-dark transition">Save Password</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
