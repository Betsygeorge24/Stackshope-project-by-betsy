{% load static %}
<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StackShop{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "dark": "#30364F",      /* Kept same for Nav/Footer/Buttons */
                        "muted": "#ACBAC4",
                        "accent": "#E1D9BC",    /* Kept same for Hero Carousel/Highlights */
                        "light": "#F8F9FA",     /* Lightened for subtle card inner-backgrounds */
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'slide-in': 'slideInLeft 0.5s ease-out',
                    }
                },
            },
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .animate-on-scroll {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: no-preference) {
            .animate-on-scroll {
                animation: fadeInUp 0.6s ease-out forwards;
            }
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-white text-dark font-display flex flex-col min-h-screen overflow-x-hidden">
    {% include "customer_templates/Navbar.html" %}
    {% include "core_templates/messages.html" %}

    {% block content %}
    {% endblock %}

    {% include "customer_templates/Footer.html" %}

    <script>
        // Common JavaScript for all pages
        document.addEventListener('DOMContentLoaded', function() {
            // Animate on scroll
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('animate-on-scroll');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.animate-on-scroll').forEach(el => {
                observer.observe(el);
            });
        });
    </script>
</body>
</html>
